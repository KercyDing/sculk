name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-22.04
            suffix: linux-amd64
          - target: x86_64-apple-darwin
            runner: macos-latest
            suffix: darwin-amd64
          - target: aarch64-apple-darwin
            runner: macos-latest
            suffix: darwin-arm64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            suffix: windows-amd64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.1"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --workspace --bins --release --target ${{ matrix.target }}

      - name: Rename artifacts (unix)
        if: runner.os != 'Windows'
        run: |
          mv target/${{ matrix.target }}/release/sckc sckc-${{ matrix.suffix }}
          mv target/${{ matrix.target }}/release/sckt sckt-${{ matrix.suffix }}

      - name: Rename artifacts (windows)
        if: runner.os == 'Windows'
        run: |
          mv target/${{ matrix.target }}/release/sckc.exe sckc-${{ matrix.suffix }}.exe
          mv target/${{ matrix.target }}/release/sckt.exe sckt-${{ matrix.suffix }}.exe

      - name: Upload artifacts (unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-bins
          path: |
            sckc-${{ matrix.suffix }}
            sckt-${{ matrix.suffix }}

      - name: Upload artifacts (windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-bins
          path: |
            sckc-${{ matrix.suffix }}.exe
            sckt-${{ matrix.suffix }}.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            sckc-*
            sckt-*
          generate_release_notes: true

  aur:
    needs: release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - pkg: sculk-cli-bin
            dir: packaging/arch/sculk-cli-bin
          - pkg: sculk-tui-bin
            dir: packaging/arch/sculk-tui-bin
          - pkg: sculk-cli-git
            dir: packaging/arch/sculk-cli-git
          - pkg: sculk-tui-git
            dir: packaging/arch/sculk-tui-git
    steps:
      - uses: actions/checkout@v4

      - name: Update pkgver in PKGBUILD
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" ${{ matrix.dir }}/PKGBUILD

      - name: Update sha256sums for -bin packages
        if: contains(matrix.pkg, '-bin')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "${{ matrix.pkg }}" == "sculk-cli-bin" ]]; then
            ASSET_URL="https://github.com/KercyDing/sculk/releases/download/v${VERSION}/sckc-linux-amd64"
          else
            ASSET_URL="https://github.com/KercyDing/sculk/releases/download/v${VERSION}/sckt-linux-amd64"
          fi
          SHA=$(curl -sL "$ASSET_URL" | sha256sum | cut -d' ' -f1)
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA}')/" ${{ matrix.dir }}/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: ${{ matrix.pkg }}
          pkgbuild: ${{ matrix.dir }}/PKGBUILD
          commit_username: KercyDing
          commit_email: dkx215417@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
