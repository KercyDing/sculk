name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: sculk-linux-amd64
          - target: x86_64-apple-darwin
            runner: macos-13
            artifact: sculk-darwin-amd64
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: sculk-darwin-arm64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: sculk-windows-amd64.exe

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.1"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build -p sculk-cli --release --target ${{ matrix.target }}

      - name: Rename artifact (unix)
        if: runner.os != 'Windows'
        run: mv target/${{ matrix.target }}/release/sculk ${{ matrix.artifact }}

      - name: Rename artifact (windows)
        if: runner.os == 'Windows'
        run: mv target/${{ matrix.target }}/release/sculk.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: sculk-*
          generate_release_notes: true
